const MC_LS = 'bc_pw';
let mcSlides=[], mcIdx=0, mcBound=false;
function b64b(s){const bin=atob(s);const b=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)b[i]=bin.charCodeAt(i);return b;}
async function mcDecrypt(pw){
  const enc=new TextEncoder();
  const base=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64b(MC_BLOB.salt),iterations:MC_BLOB.iterations,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64b(MC_BLOB.iv)},key,b64b(MC_BLOB.ciphertext));
  return new TextDecoder().decode(pt);
}
function mcGo(i){
  if(i<0||i>=mcSlides.length)return;
  mcSlides[mcIdx].classList.remove('live');
  mcIdx=i;
  mcSlides[mcIdx].classList.add('live');
  mcSlides[mcIdx].scrollTop=0;
  if(mcSlides[mcIdx].classList.contains('cover')){
    const c=mcSlides[mcIdx]; c.classList.remove('play'); void c.offsetWidth; c.classList.add('play');
  }
  document.getElementById('mc-cnt').textContent=(i+1)+' / '+mcSlides.length;
  document.getElementById('mc-lab').textContent=mcSlides[i].dataset.label;
  document.getElementById('mc-prog').style.width=((i+1)/mcSlides.length*100)+'%';
  document.querySelectorAll('#mc-dots .dot').forEach(function(d,n){d.classList.toggle('on',n===i);});
}
function mcReveal(h){
  const stage=document.getElementById('mc-stage');
  if(!stage.dataset.filled){stage.innerHTML=h;stage.dataset.filled='1';}
  document.getElementById('mc-gate').style.display='none';
  document.getElementById('mc-deck').classList.add('on');
  if(mcBound)return; mcBound=true;
  mcSlides=Array.prototype.slice.call(document.querySelectorAll('.sl'));
  const dots=document.getElementById('mc-dots');
  mcSlides.forEach(function(s,n){
    const b=document.createElement('button'); b.className='dot'; b.title=s.dataset.label;
    b.addEventListener('click',function(){mcGo(n);}); dots.appendChild(b);
  });
  document.getElementById('mc-next').addEventListener('click',function(){mcGo(mcIdx+1);});
  document.getElementById('mc-prev').addEventListener('click',function(){mcGo(mcIdx-1);});
  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '){e.preventDefault();mcGo(mcIdx+1);}
    if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();mcGo(mcIdx-1);}
    if(e.key==='Home')mcGo(0);
    if(e.key==='End')mcGo(mcSlides.length-1);
  });
  mcGo(0);
}
async function mcTry(pw,silent){
  const err=document.getElementById('mc-err');
  try{const h=await mcDecrypt(pw);try{localStorage.setItem(MC_LS,pw);}catch(e){}mcReveal(h);}
  catch(e){if(!silent){err.textContent='wrong password';err.hidden=false;}try{localStorage.removeItem(MC_LS);}catch(e2){}}
}
document.getElementById('mc-form').addEventListener('submit',function(e){e.preventDefault();mcTry(document.getElementById('mc-pw').value,false);});
document.addEventListener('click',function(e){if(e.target&&e.target.id==='mc-lock'){e.preventDefault();try{localStorage.removeItem(MC_LS);}catch(err){}location.reload();}});
(function(){let s=null;try{s=localStorage.getItem(MC_LS);}catch(e){}if(s)mcTry(s,true);else document.getElementById('mc-pw').focus();})();
</script>
