const PD_LS = 'bc_pw', PD_PN = 'pd_partner';
function b64b(s){const bin=atob(s);const b=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)b[i]=bin.charCodeAt(i);return b;}
async function pdDecrypt(pw){
  const enc=new TextEncoder();
  const base=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64b(PD_BLOB.salt),iterations:PD_BLOB.iterations,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64b(PD_BLOB.iv)},key,b64b(PD_BLOB.ciphertext));
  return new TextDecoder().decode(pt);
}
let pdBound=false, pdIdx=0, pdSlides=[];

function pdPartner(name){
  document.querySelectorAll('.pn').forEach(function(e){e.textContent=name;});
  document.getElementById('pd-pn').textContent='Partner: '+name;
  try{localStorage.setItem(PD_PN,name);}catch(e){}
}
function pdGo(i){
  if(i<0||i>=pdSlides.length)return;
  pdSlides[pdIdx].classList.remove('live');
  pdIdx=i;
  pdSlides[pdIdx].classList.add('live');
  pdSlides[pdIdx].scrollTop=0;
  if(pdSlides[pdIdx].classList.contains('cover')){
    const c=pdSlides[pdIdx]; c.classList.remove('play'); void c.offsetWidth; c.classList.add('play');
  }
  document.getElementById('pd-cnt').textContent=(i+1)+' / '+pdSlides.length;
  document.getElementById('pd-lab').textContent=pdSlides[i].dataset.label;
  document.getElementById('pd-prog').style.width=((i+1)/pdSlides.length*100)+'%';
  document.querySelectorAll('#pd-dots .dot').forEach(function(d,n){d.classList.toggle('on',n===i);});
}
function pdReveal(h){
  const stage=document.getElementById('pd-stage');
  if(!stage.dataset.filled){stage.innerHTML=h;stage.dataset.filled='1';}
  document.getElementById('pd-gate').style.display='none';
  document.getElementById('pd-deck').classList.add('on');
  if(pdBound)return; pdBound=true;
  pdSlides=Array.prototype.slice.call(document.querySelectorAll('.sl'));
  const dots=document.getElementById('pd-dots');
  pdSlides.forEach(function(s,n){
    const b=document.createElement('button'); b.className='dot'; b.title=s.dataset.label;
    b.addEventListener('click',function(){pdGo(n);}); dots.appendChild(b);
  });
  let saved=null; try{saved=localStorage.getItem(PD_PN);}catch(e){}
  pdPartner(saved||'Lazada');
  document.getElementById('pd-next').addEventListener('click',function(){pdGo(pdIdx+1);});
  document.getElementById('pd-prev').addEventListener('click',function(){pdGo(pdIdx-1);});
  document.getElementById('pd-pn').addEventListener('click',function(){
    let cur=document.getElementById('pd-pn').textContent.replace('Partner: ','');
    const v=prompt('Partner name for this deck',cur);
    if(v&&v.trim())pdPartner(v.trim());
  });
  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '){e.preventDefault();pdGo(pdIdx+1);}
    if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();pdGo(pdIdx-1);}
    if(e.key==='Home')pdGo(0);
    if(e.key==='End')pdGo(pdSlides.length-1);
  });
  pdGo(0);
}
async function pdTry(pw,silent){
  const err=document.getElementById('pd-err');
  try{const h=await pdDecrypt(pw);try{localStorage.setItem(PD_LS,pw);}catch(e){}pdReveal(h);}
  catch(e){if(!silent){err.textContent='wrong password';err.hidden=false;}try{localStorage.removeItem(PD_LS);}catch(e2){}}
}
document.getElementById('pd-form').addEventListener('submit',function(e){e.preventDefault();pdTry(document.getElementById('pd-pw').value,false);});
document.addEventListener('click',function(e){if(e.target&&e.target.id==='pd-lock'){e.preventDefault();try{localStorage.removeItem(PD_LS);}catch(err){}location.reload();}});
(function(){let s=null;try{s=localStorage.getItem(PD_LS);}catch(e){}if(s)pdTry(s,true);else document.getElementById('pd-pw').focus();})();
</script>
