const HB_LS = 'bc_pw';
function b64b(s){const bin=atob(s);const b=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)b[i]=bin.charCodeAt(i);return b;}
async function hbDecrypt(pw){
  const enc=new TextEncoder();
  const base=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64b(HB_BLOB.salt),iterations:HB_BLOB.iterations,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64b(HB_BLOB.iv)},key,b64b(HB_BLOB.ciphertext));
  return new TextDecoder().decode(pt);
}
let hbBound=false, hbIdx=0, hbSlides=[];
function hbGo(i){
  if(i<0||i>=hbSlides.length)return;
  hbSlides[hbIdx].classList.remove('live');
  hbIdx=i;
  hbSlides[hbIdx].classList.add('live');
  hbSlides[hbIdx].scrollTop=0;
  document.getElementById('hb-cnt').textContent=(i+1)+' / '+hbSlides.length;
  document.getElementById('hb-lab').textContent=hbSlides[i].dataset.label;
  document.getElementById('hb-prog').style.width=((i+1)/hbSlides.length*100)+'%';
  document.querySelectorAll('#hb-dots .dot').forEach(function(d,n){d.classList.toggle('on',n===i);});
}
function hbReveal(h){
  const stage=document.getElementById('hb-stage');
  if(!stage.dataset.filled){stage.innerHTML=h;stage.dataset.filled='1';}
  document.getElementById('hb-gate').style.display='none';
  document.getElementById('hb-deck').classList.add('on');
  if(hbBound)return; hbBound=true;
  hbSlides=Array.prototype.slice.call(document.querySelectorAll('.sl'));
  const dots=document.getElementById('hb-dots');
  hbSlides.forEach(function(s,n){
    const b=document.createElement('button'); b.className='dot'; b.title=s.dataset.label;
    b.addEventListener('click',function(){hbGo(n);}); dots.appendChild(b);
  });
  document.getElementById('hb-next').addEventListener('click',function(){hbGo(hbIdx+1);});
  document.getElementById('hb-prev').addEventListener('click',function(){hbGo(hbIdx-1);});
  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '){e.preventDefault();hbGo(hbIdx+1);}
    if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();hbGo(hbIdx-1);}
    if(e.key==='Home')hbGo(0);
    if(e.key==='End')hbGo(hbSlides.length-1);
  });
  hbGo(0);
}
async function hbTry(pw,silent){
  const err=document.getElementById('hb-err');
  try{const h=await hbDecrypt(pw);try{localStorage.setItem(HB_LS,pw);}catch(e){}hbReveal(h);}
  catch(e){if(!silent){err.textContent='wrong password';err.hidden=false;}try{localStorage.removeItem(HB_LS);}catch(e2){}}
}
document.getElementById('hb-form').addEventListener('submit',function(e){e.preventDefault();hbTry(document.getElementById('hb-pw').value,false);});
document.addEventListener('click',function(e){if(e.target&&e.target.id==='hb-lock'){e.preventDefault();try{localStorage.removeItem(HB_LS);}catch(err){}location.reload();}});
(function(){let s=null;try{s=localStorage.getItem(HB_LS);}catch(e){}if(s)hbTry(s,true);else document.getElementById('hb-pw').focus();})();
</script>
