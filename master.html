const MT_LS = 'bc_pw';
let mtBound = false;
function b64b(s){const bin=atob(s);const b=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)b[i]=bin.charCodeAt(i);return b;}
async function mtDecrypt(pw){
  const enc=new TextEncoder();
  const base=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64b(MT_BLOB.salt),iterations:MT_BLOB.iterations,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64b(MT_BLOB.iv)},key,b64b(MT_BLOB.ciphertext));
  return new TextDecoder().decode(pt);
}
function mtReveal(h){
  const stage=document.getElementById('mt-stage');
  if(!stage.dataset.filled){stage.innerHTML=h;stage.dataset.filled='1';}
  document.getElementById('mt-gate').style.display='none';
  document.getElementById('mt-doc').classList.add('on');
  if(mtBound)return; mtBound=true;

  const cpy=document.getElementById('mt-cpy');
  if(cpy)cpy.addEventListener('click',function(){
    const t=document.getElementById('mt-pre').textContent;
    navigator.clipboard.writeText(t).then(function(){cpy.textContent='Copied';setTimeout(function(){cpy.textContent='Copy';},1600);});
  });

  const links=Array.prototype.slice.call(document.querySelectorAll('nav.side a[data-s]'));
  const secs=links.map(function(a){return document.getElementById(a.dataset.s);}).filter(Boolean);
  function spy(){
    let cur=0;
    secs.forEach(function(s,i){if(s.getBoundingClientRect().top<=140)cur=i;});
    links.forEach(function(a,i){a.classList.toggle('on',i===cur);});
  }
  window.addEventListener('scroll',spy,{passive:true});
  spy();
}
async function mtTry(pw,silent){
  const err=document.getElementById('mt-err');
  try{const h=await mtDecrypt(pw);try{localStorage.setItem(MT_LS,pw);}catch(e){}mtReveal(h);}
  catch(e){if(!silent){err.textContent='wrong password';err.hidden=false;}try{localStorage.removeItem(MT_LS);}catch(e2){}}
}
document.getElementById('mt-form').addEventListener('submit',function(e){e.preventDefault();mtTry(document.getElementById('mt-pw').value,false);});
document.addEventListener('click',function(e){if(e.target&&e.target.id==='mt-lock'){e.preventDefault();try{localStorage.removeItem(MT_LS);}catch(err){}location.reload();}});
(function(){let s=null;try{s=localStorage.getItem(MT_LS);}catch(e){}if(s)mtTry(s,true);else document.getElementById('mt-pw').focus();})();
</script>
